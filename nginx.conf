server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Block hidden files (except ACME well-known paths).
    location ~ /\.(?!well-known).* {
        deny all;
        return 404;
    }

    # Optional hardening: do not expose source maps in production.
    location ~* \.map$ {
        return 404;
    }

    # React SPA fallback for direct route hits and refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
